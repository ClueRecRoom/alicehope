<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Alice Hope</title>
  <link rel="stylesheet" href="groktestweb.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a href="GrokTestweb.html" class="back-link">← Back to shop</a>
    </div>

    <div class="topbar-center">
      <img src="images/Alicehope.png" alt="Alice Hope Logo" class="header-logo">
      <h1>CHECKOUT</h1>
      <p class="sub-date">Complete your order</p>
    </div>

    <div class="topbar-right">
      <span class="checkout-cart-label">Your Cart</span>
    </div>
  </header>

  <main class="checkout-wrapper">
    <div class="checkout-grid">

      <section class="checkout-panel">
        <h2>Shipping & Payment</h2>

        <div id="emptyCartMessage" class="empty-cart-message" style="display:none;">
          Your cart is empty.
        </div>

        <div id="checkoutContent">
          <h3 class="section-title">Shipping Address</h3>
          <div class="form-grid">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input id="firstName" type="text" placeholder="First name">
            </div>

            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input id="lastName" type="text" placeholder="Last name">
            </div>

            <div class="form-group full">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="Email address">
            </div>

            <div class="form-group full">
              <label for="address">Address</label>
              <input id="address" type="text" placeholder="Street address">
            </div>

            <div class="form-group">
              <label for="city">City</label>
              <input id="city" type="text" placeholder="City">
            </div>

            <div class="form-group">
              <label for="state">State</label>
              <input id="state" type="text" placeholder="State">
            </div>

            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input id="zip" type="text" placeholder="ZIP code">
            </div>

            <div class="form-group">
              <label for="country">Country</label>
              <select id="country">
                <option>United States</option>
                <option>Canada</option>
                <option>United Kingdom</option>
              </select>
            </div>
          </div>

          <h3 class="section-title">Payment</h3>
          <div class="form-grid">
            <div class="form-group full">
              <label for="cardName">Name on Card</label>
              <input id="cardName" type="text" placeholder="Cardholder name">
            </div>

            <div class="form-group full">
              <label for="cardNumber">Card Number</label>
              <input id="cardNumber" type="text" placeholder="1234 5678 9012 3456">
            </div>

            <div class="form-group">
              <label for="expiry">Expiration</label>
              <input id="expiry" type="text" placeholder="MM/YY">
            </div>

            <div class="form-group">
              <label for="cvv">CVV</label>
              <input id="cvv" type="text" placeholder="123">
            </div>
          </div>

          <button class="place-order-btn" id="placeOrderBtn">Place Order</button>
          <p class="secure-note">Your payment information is securely processed.</p>
        </div>
      </section>

      <aside class="summary-panel">
        <h2>Order Summary</h2>

        <div id="cartItems"></div>

        <div class="coupon-box">
          <label for="couponCode">Coupon Code</label>
          <div class="coupon-row">
            <input id="couponCode" type="text" placeholder="Enter code">
            <button id="applyCouponBtn" class="coupon-btn">Apply</button>
          </div>
          <p id="couponMessage" class="coupon-message"></p>
        </div>

        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotalValue">$0.00</span>
        </div>

        <div class="summary-row">
          <span>Discount</span>
          <span id="discountValue">-$0.00</span>
        </div>

        <div class="summary-row">
          <span>Shipping</span>
          <span id="shippingValue">$0.00</span>
        </div>

        <div class="summary-row">
          <span>Tax</span>
          <span id="taxValue">$0.00</span>
        </div>

        <div class="summary-total">
          <span>Total</span>
          <span id="totalValue">$0.00</span>
        </div>
      </aside>

    </div>
  </main>

  <script>
    async function sendOrderToDiscord(orderData) {
  const webhookUrl = 'https://discord.com/api/webhooks/1490167073010356224/3D5y05tuuSjB_dtDXowaq7MSAuCHXFUCerS-nhl51ew48KXkrdllODs2DP84dQ9n-R3E';

  const itemLines = orderData.items
    .map(item => `• ${item.name} x${item.quantity} - $${(item.price * item.quantity).toFixed(2)}`)
    .join('\n');

  const message = {
    username: 'Alice Hope Orders',
    embeds: [
      {
        title: 'New Order Received',
        color: 0x2ea44f,
        fields: [
          { name: 'Order #', value: orderData.orderNumber, inline: true },
          { name: 'Date', value: orderData.orderDate, inline: true },
          { name: 'Customer', value: `${orderData.firstName} ${orderData.lastName}`, inline: false },
          { name: 'Email', value: orderData.email, inline: false },
          {
            name: 'Shipping',
            value: `${orderData.address}\n${orderData.city}, ${orderData.state} ${orderData.zip}\n${orderData.country}`,
            inline: false
          },
          { name: 'Items', value: itemLines || 'No items', inline: false },
          {
            name: 'Total',
            value: `$${Number(orderData.total).toFixed(2)}`,
            inline: false
          }
        ],
        footer: {
          text: 'Alice Hope Dashboard'
        }
      }
    ]
  };

  await fetch(webhookUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(message)
  });
}
    const cartItemsContainer = document.getElementById('cartItems');
    const subtotalValue = document.getElementById('subtotalValue');
    const discountValue = document.getElementById('discountValue');
    const shippingValue = document.getElementById('shippingValue');
    const taxValue = document.getElementById('taxValue');
    const totalValue = document.getElementById('totalValue');
    const emptyCartMessage = document.getElementById('emptyCartMessage');
    const checkoutContent = document.getElementById('checkoutContent');
    const couponCodeInput = document.getElementById('couponCode');
    const applyCouponBtn = document.getElementById('applyCouponBtn');
    const couponMessage = document.getElementById('couponMessage');

    let appliedCoupon = localStorage.getItem('couponCode') || '';

    function getCart() {
      return JSON.parse(localStorage.getItem('cart')) || [];
    }

    function saveCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function formatPrice(value) {
      return `$${Number(value).toFixed(2)}`;
    }

    function getDiscount(subtotal) {
      if (appliedCoupon === 'SAVE10') return subtotal * 0.10;
      if (appliedCoupon === 'HOPE20') return subtotal * 0.20;
      if (appliedCoupon === 'FREESHIP') return 0;
      if (appliedCoupon === 'TEST') return subtotal * 1;
      return 0;
    }

    function getShipping(subtotal, cartLength) {
      if (cartLength === 0) return 0;
      if (appliedCoupon === 'FREESHIP') return 0;
      if (appliedCoupon === 'TEST') return 0;
      return subtotal >= 100 ? 0 : 8;
    }

    function updateSummary(cart) {
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const discount = getDiscount(subtotal);
      const shipping = getShipping(subtotal, cart.length);
      const taxedAmount = subtotal - discount;
      const tax = taxedAmount * 0.07;
      const total = taxedAmount + shipping + tax;

      subtotalValue.textContent = formatPrice(subtotal);
      discountValue.textContent = `-${formatPrice(discount)}`;
      shippingValue.textContent = formatPrice(shipping);
      taxValue.textContent = formatPrice(tax);
      totalValue.textContent = formatPrice(total);
    }

    function renderCart() {
      const cart = getCart();
      cartItemsContainer.innerHTML = '';

      if (cart.length === 0) {
        emptyCartMessage.style.display = 'block';
        checkoutContent.style.display = 'none';
        cartItemsContainer.innerHTML = '<p class="empty-summary">No items in cart.</p>';
        updateSummary([]);
        return;
      }

      emptyCartMessage.style.display = 'none';
      checkoutContent.style.display = 'block';

      cart.forEach(item => {
        const itemElement = document.createElement('div');
        itemElement.className = 'summary-item';

        itemElement.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <div class="summary-item-info">
            <h3>${item.name}</h3>
            <p>${formatPrice(item.price)} each</p>
            <div class="qty-row">
              <button class="qty-btn" data-action="decrease" data-id="${item.id}">−</button>
              <span class="qty-number">${item.quantity}</span>
              <button class="qty-btn" data-action="increase" data-id="${item.id}">+</button>
              <button class="remove-btn" data-action="remove" data-id="${item.id}">Remove</button>
            </div>
          </div>
        `;

        cartItemsContainer.appendChild(itemElement);
      });

      updateSummary(cart);
    }

    cartItemsContainer.addEventListener('click', function (e) {
      const button = e.target.closest('button');
      if (!button) return;

      const action = button.dataset.action;
      const id = button.dataset.id;
      let cart = getCart();
      const item = cart.find(product => product.id === id);

      if (!item && action !== 'remove') return;

      if (action === 'increase') {
        item.quantity += 1;
      }

      if (action === 'decrease') {
        item.quantity -= 1;
        if (item.quantity <= 0) {
          cart = cart.filter(product => product.id !== id);
        }
      }

      if (action === 'remove') {
        cart = cart.filter(product => product.id !== id);
      }

      saveCart(cart);
      renderCart();
    });

    applyCouponBtn.addEventListener('click', function () {
      const code = couponCodeInput.value.trim().toUpperCase();

      if (code === 'SAVE10' || code === 'HOPE20' || code === 'FREESHIP'|| code === 'TEST') {
        appliedCoupon = code;
        localStorage.setItem('couponCode', code);
        couponMessage.textContent = `Coupon applied: ${code}`;
      } else {
        appliedCoupon = '';
        localStorage.removeItem('couponCode');
        couponMessage.textContent = 'Invalid coupon code.';
      }

      renderCart();
    });

    document.getElementById('placeOrderBtn').addEventListener('click', function () {
      const cart = getCart();

      if (cart.length === 0) {
        alert('Your cart is empty.');
        return;
      }

      const requiredFields = [
        'firstName', 'lastName', 'email', 'address',
        'city', 'state', 'zip', 'cardName',
        'cardNumber', 'expiry', 'cvv'
      ];

      const missingField = requiredFields.find(id => !document.getElementById(id).value.trim());

      if (missingField) {
        alert('Please fill out all checkout fields.');
        return;
      }

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const discount = getDiscount(subtotal);
      const shipping = getShipping(subtotal, cart.length);
      const taxedAmount = subtotal - discount;
      const tax = taxedAmount * 0.07;
      const total = taxedAmount + shipping + tax;

      const orderData = {
  orderNumber: 'AH-' + Math.floor(100000 + Math.random() * 900000),
  orderDate: new Date().toISOString(),
  firstName: document.getElementById('firstName').value.trim(),
  lastName: document.getElementById('lastName').value.trim(),
  email: document.getElementById('email').value.trim(),
  address: document.getElementById('address').value.trim(),
  city: document.getElementById('city').value.trim(),
  state: document.getElementById('state').value.trim(),
  zip: document.getElementById('zip').value.trim(),
  country: document.getElementById('country').value,
  items: cart,
  subtotal: subtotal,
  discount: discount,
  shipping: shipping,
  tax: tax,
  total: total,
  coupon: localStorage.getItem('couponCode') || '',
  status: 'Pending'
};

const existingOrders = JSON.parse(localStorage.getItem('orders')) || [];
existingOrders.unshift(orderData);

localStorage.setItem('orders', JSON.stringify(existingOrders));
localStorage.setItem('lastOrder', JSON.stringify(orderData));
localStorage.removeItem('cart');
localStorage.removeItem('couponCode');

window.location.href = 'Orderplaced.html';
    });

    if (appliedCoupon) {
      couponCodeInput.value = appliedCoupon;
      couponMessage.textContent = `Coupon applied: ${appliedCoupon}`;
    }

    renderCart();
  </script>
</body>
</html>
