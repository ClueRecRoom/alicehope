<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alice Hope</title>
  <link rel="stylesheet" href="groktestweb.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="search-wrap" id="searchWrap">
        <img src="https://www.freeiconspng.com/thumbs/magnifying-glass-icon/magnifying-glass-icon-13.png" class="search-icon" alt="search">
        <input type="text" id="searchInput" class="search-input" placeholder="Search items...">
      </div>
    </div>

    <div class="topbar-center">
      <img src="images/Alicehope.png" alt="Alice Hope Logo" class="header-logo">
      <h1>SHOP</h1>
      <p class="sub-date">Last Updated 4/4/2026</p>
    </div>

    <div class="topbar-right">
      <a href="checkout.html" class="cart-link">
        <div class="cart-icon-wrap">
          <img src="https://www.citypng.com/public/uploads/preview/download-hd-shopping-cart-black-logo-icon-png-701751694973932xwblxf69dg.png" class="cart-icon" alt="cart">
          <span class="cart-count" id="cartCount">0</span>
        </div>
      </a>
    </div>
  </header>

  <main class="shop-wrapper">
    <section id="shopping-area" class="shopping-area">
      <div class="products">

        <div class="product-card"
             data-id="hope-zip-up"
             data-name="Hopes Zip-up"
             data-price="45"
             data-image="images/hopezipup.png">
          <img src="images/hopezipup.png" alt="Hopes Zip-up">
          <h3>Hopes Zip-up</h3>
          <p>$45.00 USD</p>
          <button class="buy-btn add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card"
             data-id="red-era-shirt"
             data-name="Red Era Shirt"
             data-price="40"
             data-image="https://shop.nettspend.io/cdn/shop/files/uygkhij.jpg?v=1772633433&width=480">
          <img src="https://shop.nettspend.io/cdn/shop/files/uygkhij.jpg?v=1772633433&width=480" alt="Red Era Shirt">
          <h3>Red Era Shirt</h3>
          <p>$40.00 USD</p>
          <button class="buy-btn add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card"
             data-id="black-elc-hoodie"
             data-name="Black ELC Hoodie"
             data-price="65"
             data-image="https://shop.nettspend.io/cdn/shop/files/BLACKELCHOOD.jpg?v=1772854314&width=480">
          <img src="https://shop.nettspend.io/cdn/shop/files/BLACKELCHOOD.jpg?v=1772854314&width=480" alt="Black ELC Hoodie">
          <h3>Black ELC Hoodie</h3>
          <p>$65.00 USD</p>
          <button class="buy-btn add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="product-card"
             data-id="chrome-hearts-long-sleeve"
             data-name="Chrome Hearts Long Sleeve"
             data-price="900"
             data-image="https://image.goat.com/transform/v1/attachments/product_template_additional_pictures/images/101/385/830/original/768204_01.jpg?action=crop&width=750">
          <img src="https://image.goat.com/transform/v1/attachments/product_template_additional_pictures/images/101/385/830/original/768204_01.jpg?action=crop&width=750" alt="Chrome Hearts Long Sleeve">
          <h3>Chrome Hearts Long Sleeve</h3>
          <p>$900.00 USD</p>
          <button class="buy-btn add-to-cart-btn">Add to Cart</button>
        </div>

      </div>

      <p id="noResultsMessage" class="no-results" style="display: none;">No items found.</p>
    </section>
  </main>

  <div class="site-owner-trigger" id="siteOwnerTrigger">Site Owner?</div>

  <div class="password-modal" id="passwordModal">
    <div class="modal-content">
      <button class="close-modal" id="closeModal">&times;</button>
      <h2>Owner Access</h2>
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
      <button class="unlock-btn" onclick="checkPassword()">Enter</button>
      <div class="error" id="errorMsg"></div>
    </div>
  </div>

  <script>
    const siteOwnerTrigger = document.getElementById('siteOwnerTrigger');
    const passwordModal = document.getElementById('passwordModal');
    const closeModal = document.getElementById('closeModal');
    const passwordInput = document.getElementById('passwordInput');
    const errorMsg = document.getElementById('errorMsg');
    const searchInput = document.getElementById('searchInput');
    const noResultsMessage = document.getElementById('noResultsMessage');
    const cartCount = document.getElementById('cartCount');

    function getCart() {
      return JSON.parse(localStorage.getItem('cart')) || [];
    }

    function saveCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const cart = getCart();
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCount.textContent = totalItems;
      cartCount.style.display = totalItems > 0 ? 'flex' : 'none';
    }

    function addToCart(product) {
      const cart = getCart();
      const existingItem = cart.find(item => item.id === product.id);

      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({
          ...product,
          quantity: 1
        });
      }

      saveCart(cart);
    }

    document.querySelectorAll('.add-to-cart-btn').forEach(button => {
      button.addEventListener('click', function () {
        const card = this.closest('.product-card');

        const product = {
          id: card.dataset.id,
          name: card.dataset.name,
          price: Number(card.dataset.price),
          image: card.dataset.image
        };

        addToCart(product);

        const originalText = this.textContent;
        this.textContent = 'Added';
        this.classList.add('added');

        setTimeout(() => {
          this.textContent = originalText;
          this.classList.remove('added');
        }, 900);
      });
    });

    function filterProducts() {
      const searchValue = searchInput.value.toLowerCase().trim();
      const productCards = document.querySelectorAll('.product-card');
      let visibleCount = 0;

      productCards.forEach(card => {
        const productName = card.querySelector('h3')?.textContent.toLowerCase() || '';
        const productPrice = card.querySelector('p')?.textContent.toLowerCase() || '';
        const productAlt = card.querySelector('img')?.alt.toLowerCase() || '';
        const searchableText = `${productName} ${productPrice} ${productAlt}`;

        if (searchableText.includes(searchValue)) {
          card.style.display = '';
          visibleCount++;
        } else {
          card.style.display = 'none';
        }
      });

      noResultsMessage.style.display = visibleCount === 0 ? 'block' : 'none';
    }

    searchInput.addEventListener('input', filterProducts);

    siteOwnerTrigger.addEventListener('click', function () {
      passwordModal.style.display = 'flex';
      passwordInput.focus();
    });

    closeModal.addEventListener('click', function () {
      passwordModal.style.display = 'none';
      passwordInput.value = '';
      errorMsg.textContent = '';
    });

    passwordModal.addEventListener('click', function (e) {
      if (e.target === passwordModal) {
        passwordModal.style.display = 'none';
        passwordInput.value = '';
        errorMsg.textContent = '';
      }
    });

    passwordInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        checkPassword();
      }
    });

    function checkPassword() {
      const input = passwordInput.value.trim();

if (input === "F") {
  window.location.href = 'owner.html';

      } else {
        errorMsg.textContent = 'Incorrect password.';
        passwordInput.value = '';
      }
    }

    updateCartCount();
  </script>
</body>
</html>
