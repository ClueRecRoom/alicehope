<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Placed | Alice Hope</title>
  <link rel="stylesheet" href="groktestweb.css">
  <style>
    .success-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .success-card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid #dddddd;
      padding: 42px 36px;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.06);
    }

    .success-icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: #2ea44f;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 42px;
      box-shadow: 0 10px 24px rgba(46, 164, 79, 0.22);
      animation: popIn 0.45s ease;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.6);
        opacity: 0;
      }
      70% {
        transform: scale(1.08);
        opacity: 1;
      }
      100% {
        transform: scale(1);
      }
    }

    .success-card h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 400;
    }

    .success-subtext {
      margin: 0 0 30px;
      font-size: 15px;
      color: #555;
    }

    .details-box {
      text-align: left;
      margin-top: 28px;
      border-top: 1px solid #e3e3e3;
      padding-top: 24px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin: 10px 0;
      font-size: 15px;
    }

    .detail-row strong {
      font-weight: 400;
      color: #333;
    }

    .items-box {
      margin-top: 28px;
      text-align: left;
      border-top: 1px solid #e3e3e3;
      padding-top: 24px;
    }

    .items-box h2,
    .shipping-box h2 {
      margin: 0 0 16px;
      font-size: 22px;
      font-weight: 400;
    }

    .ordered-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid #efefef;
      font-size: 15px;
    }

    .shipping-box {
      margin-top: 28px;
      text-align: left;
      border-top: 1px solid #e3e3e3;
      padding-top: 24px;
    }

    .shipping-box p {
      margin: 8px 0;
      font-size: 15px;
      color: #444;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 34px;
    }

    .action-btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid #222;
      background: #222;
      color: white;
      padding: 12px 20px;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .action-btn:hover {
      background: #000;
      transform: translateY(-1px);
    }

    .action-btn.secondary {
      background: white;
      color: #222;
    }

    .action-btn.secondary:hover {
      background: #f3f3f3;
    }

    .empty-state {
      color: #666;
      font-size: 15px;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .success-card {
        padding: 30px 22px;
      }

      .success-card h1 {
        font-size: 28px;
      }

      .detail-row,
      .ordered-item {
        flex-direction: column;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="success-wrapper">
    <section class="success-card">
      <div class="success-icon">✓</div>
      <h1>Order Placed</h1>
      <p class="success-subtext">Thank you for your order. A confirmation has been created successfully.</p>

      <div class="details-box">
        <div class="detail-row">
          <strong>Order Number</strong>
          <span id="orderNumber">—</span>
        </div>
        <div class="detail-row">
          <strong>Order Date</strong>
          <span id="orderDate">—</span>
        </div>
        <div class="detail-row">
          <strong>Email</strong>
          <span id="orderEmail">—</span>
        </div>
        <div class="detail-row">
          <strong>Total</strong>
          <span id="orderTotal">—</span>
        </div>
      </div>

      <div class="items-box">
        <h2>Items Ordered</h2>
        <div id="orderedItems"></div>
      </div>

      <div class="shipping-box">
        <h2>Shipping Details</h2>
        <p id="shippingName">—</p>
        <p id="shippingAddress">—</p>
        <p id="shippingLocation">—</p>
        <p id="shippingCountry">—</p>
      </div>

      <div class="button-row">
        <a href="GrokTestweb.html" class="action-btn">Return to Shop</a>
        <a href="checkout.html" class="action-btn secondary">Back to Checkout</a>
      </div>
    </section>
  </main>

  <script>
    const orderData = JSON.parse(localStorage.getItem('lastOrder'));

    function formatPrice(value) {
      return `$${Number(value).toFixed(2)}`;
    }

    if (!orderData) {
      document.getElementById('orderNumber').textContent = 'Unavailable';
      document.getElementById('orderDate').textContent = 'Unavailable';
      document.getElementById('orderEmail').textContent = 'Unavailable';
      document.getElementById('orderTotal').textContent = 'Unavailable';
      document.getElementById('orderedItems').innerHTML = '<p class="empty-state">No recent order details found.</p>';
      document.getElementById('shippingName').textContent = 'No shipping details found.';
      document.getElementById('shippingAddress').textContent = '';
      document.getElementById('shippingLocation').textContent = '';
      document.getElementById('shippingCountry').textContent = '';
    } else {
      document.getElementById('orderNumber').textContent = orderData.orderNumber;
      document.getElementById('orderDate').textContent = orderData.orderDate;
      document.getElementById('orderEmail').textContent = orderData.email;
      document.getElementById('orderTotal').textContent = formatPrice(orderData.total);

      document.getElementById('shippingName').textContent =
        `${orderData.firstName} ${orderData.lastName}`;

      document.getElementById('shippingAddress').textContent = orderData.address;

      document.getElementById('shippingLocation').textContent =
        `${orderData.city}, ${orderData.state} ${orderData.zip}`;

      document.getElementById('shippingCountry').textContent = orderData.country;

      const orderedItems = document.getElementById('orderedItems');
      orderedItems.innerHTML = '';

      orderData.items.forEach(item => {
        const itemElement = document.createElement('div');
        itemElement.className = 'ordered-item';
        itemElement.innerHTML = `
          <span>${item.name} × ${item.quantity}</span>
          <span>${formatPrice(item.price * item.quantity)}</span>
        `;
        orderedItems.appendChild(itemElement);
      });
    }
  </script>
</body>
</html>
